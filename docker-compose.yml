version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: film-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Anubis
      POSTGRES_DB: prac
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - film-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: film-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    networks:
      - film-network
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
    container_name: film-backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: Anubis
      DATABASE_NAME: prac
      NODE_ENV: production
      LOGGER: tskv
    ports:
      - "4000:4000"
    networks:
      - film-network
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: film-frontend
    ports:
      - "80:80"
    networks:
      - film-network
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  film-network:
    driver: bridge