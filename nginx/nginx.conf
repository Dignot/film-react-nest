server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:4000/api/;
    }

    location /content/ {
        proxy_pass http://backend:4000/content/;
    }
}