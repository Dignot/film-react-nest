name: Build & Push Docker Images

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. забираем код
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. включаем Docker Buildx (нужен для сборки)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. логин в GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # 🔥 BACKEND IMAGE
      # =========================
      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/film-backend:latest ./backend

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/film-backend:latest

      # =========================
      # 🔥 FRONTEND IMAGE
      # =========================
      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/film-frontend:latest ./frontend

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/film-frontend:latest